<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Order Summary Component</title>
  </head>
  <body>
    <div class="container">
      <main class="main-content">
        <img src="illustration-hero.svg" alt="hero" class="hero-image" />
        <h1 class="title">Order Summary</h1>
        <p class="description">
          You can now listen to millions of songs, audiobooks, and podcasts on
          any device anywhere you like!
        </p>
        <div class="plan-container">
          <img src="icon-music.svg" alt="music" class="music-icon" />
          <div class="plan-details">
            <h2 class="plan-title">Annual Plan</h2>
            <p class="plan-price">$59.99/year</p>
          </div>
          <a href="#" class="plan-change">Change</a>
        </div>
        <button class="payment-button">Proceed to Payment</button>
        <a href="#" class="cancel-button">Cancel Order</a>
      </main>
    </div>
  </body>
</html>
